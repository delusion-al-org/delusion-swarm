schema: spec-driven

context: |
  Project: delusion-swarm — Bun monorepo
  SDD Scope: packages/* y seeds/* ÚNICAMENTE. swarm/ es de Miguel — NO TOCAR.
  Stack: Astro 5 + TailwindCSS v4 + DaisyUI v5
  Blocks: @delusion/blocks — Astro component library consumida por seeds via workspace:*
  Content: Astro Content Collections (JSON) → BlockRenderer.astro → dynamic block rendering
  Architecture: meta-seed pattern — JSON drives page structure, theme via daisy.json CSS vars
  Conventions: Conventional commits, no Co-Authored-By, Bun package manager

strict_tdd: false

testing:
  note: "No test infra en packages/ ni seeds/. swarm/ tiene vitest pero está fuera del scope SDD."
  test_runner: NOT AVAILABLE (in scope)
  layers:
    unit: { available: false }
    integration: { available: false }
    e2e: { available: false }
  quality:
    type_checker: { available: true, command: "cd packages/blocks && bunx tsc --noEmit" }

rules:
  proposal:
    - Scope MUST be limited to packages/* and seeds/* — never touch swarm/
    - Identify which packages are affected (blocks, seed-landing, or both)
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - For UI blocks: include prop schema and DaisyUI components used
  design:
    - Document architecture decisions for block API design
    - Include prop interface definitions per block
  tasks:
    - Group tasks by phase (types → component → content JSON → verification)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - One task = one block or one file
  apply:
    - Follow existing .types.ts + .astro pairing pattern per block
    - Use DaisyUI semantic classes exclusively — no raw Tailwind colors
    - Theme must respond to daisy.json vars — no hardcoded brand colors
    - NEVER touch swarm/ — it belongs to Miguel
  verify:
    - Visual check: bun dev in seeds/seed-landing and inspect each block
    - Theme check: swap daisy.json values and verify all blocks respond
    - Type check: bunx tsc --noEmit on packages/blocks
  archive:
    - Warn before merging destructive deltas
