version: '3.8'

services:
  # ──────────────────────────────────────────────────────────
  # 1. ENGRAM BRAIN (La Memoria Persistente)
  # ──────────────────────────────────────────────────────────
  # Corre la base de datos distribuida de memoria de los agentes.
  # Es un stateful set crítico. Coolify debe hacer backups de esto.
  engram-brain:
    image: node:20-alpine # Cambiar por el Dockerfile de engram si existe
    command: bun run start-engram-server # Reemplazar con el comando real
    restart: unless-stopped
    volumes:
      - engram-data:/app/.engram-storage
    ports:
      - "3838:3838"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3838/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────────────────
  # 2. MASTRA DAEMON (El Motor de los Enjambres)
  # ──────────────────────────────────────────────────────────
  # Corre el entorno cognitivo y de ejecución.
  # Es stateless en el proceso, pero requiere Workspaces para caching.
  mastra-swarm:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Network links
      - ENGRAM_MODE=http
      - ENGRAM_HTTP_URL=http://engram-brain:3838
      - PORT=4111
      
      # Forge / Hydrator configs
      - AGENT_WORKSPACE=/workspaces
      - SEED_RESOLVE_MODE=npm # Fundamental para evitar FS local linkage
      
      # Supabase Configs
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      
      # Model Providers (Injected by Coolify Secrets)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      
      # GitHub Eject Auth
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      
    volumes:
      - mastra-workspaces:/workspaces # Persistencia local de ASTs y Node Modules CACHE
      - /tmp/mastra-sandbox:/tmp/sandbox # Volúmen efímero opcional
    ports:
      - "4111:4111"
    depends_on:
      engram-brain:
        condition: service_healthy

volumes:
  engram-data:
    name: engram-data
  mastra-workspaces:
    name: mastra-workspaces
