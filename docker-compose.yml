services:
  swarm:
    build: .
    ports:
      - "${PORT:-4111}:4111"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4111/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
